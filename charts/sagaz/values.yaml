replicaCount: 1

image:
  repository: sagaz/sagaz
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

postgresql:
  enabled: true
  auth:
    database: sagaz

redis:
  enabled: true
