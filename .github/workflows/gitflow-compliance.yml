name: GitFlow Compliance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main
      - develop

env:
  CI: true
  # Improvement #2: Configurable bot list for easy maintenance
  ALLOWED_BOTS: |
    dependabot[bot]
    renovate[bot]
    github-actions[bot]

jobs:
# ─── Prevent Direct Pushes ────────────────────────────────────────────────────

  prevent-direct-push:
    name: Prevent Direct Push to Protected Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      issues: write  # Improvement #8: Permission to create issues for violations
    steps:
      - name: Check for direct push to main or develop
        uses: actions/github-script@v9
        with:
          script: |
            const event = context.payload;
            const ref = event.ref;
            const branch = ref.replace('refs/heads/', '');
            const pusher = event.pusher.name;
            const commitSha = event.head_commit.id;
            const commitMessage = event.head_commit.message || '';
            const timestamp = new Date().toISOString();
            
            // Improvement #2: Use configurable bot list from environment
            const allowedBotsEnv = process.env.ALLOWED_BOTS || '';
            const allowedBots = allowedBotsEnv
              .split('\n')
              .map(b => b.trim())
              .filter(b => b.length > 0);
            
            // Check if pusher is an allowed bot
            const isAllowedBot = allowedBots.includes(pusher) || event.user?.type === 'Bot';
            
            // Improvement #4: Enhanced structured logging for audit trail
            const auditLog = {
              timestamp,
              event_type: 'push_protection_check',
              pusher,
              pusher_type: event.user?.type || 'User',
              branch,
              commit_sha: commitSha,
              is_merge_commit: /^Merge (pull request|branch)/.test(commitMessage),
              is_bot_push: isAllowedBot,
              protected_branch: branch === 'main' || branch === 'develop',
              action: null,
              reason: null
            };
            
            if (isAllowedBot) {
              auditLog.action = 'ALLOWED';
              auditLog.reason = 'bot_push';
              core.info(`✅ Bot push allowed: ${pusher}`);
              core.info(JSON.stringify(auditLog));
              return;
            }
            
            // Check if this is a merge commit (from GitHub auto-merge or merge workflow)
            if (/^Merge (pull request|branch)/.test(commitMessage)) {
              auditLog.action = 'ALLOWED';
              auditLog.reason = 'merge_commit';
              core.info('✅ Merge commit allowed');
              core.info(JSON.stringify(auditLog));
              return;
            }
            
            // Only protect main and develop from direct pushes
            if (branch === 'main' || branch === 'develop') {
              auditLog.action = 'BLOCKED';
              auditLog.reason = 'direct_push_to_protected_branch';
              
              const errorMessage = `❌ Direct pushes to '${branch}' are not allowed.\n\n` +
                `Please use the GitFlow workflow:\n` +
                `  1. Create a feature branch: git checkout -b feature/your-feature\n` +
                `  2. Push your branch: git push -u origin feature/your-feature\n` +
                `  3. Create a Pull Request on GitHub\n` +
                `  4. Get approval and merge via GitHub UI\n\n` +
                `This ensures all commits follow conventional format and pass CI/CD checks.`;
              
              core.setFailed(errorMessage);
              core.info(JSON.stringify(auditLog));
              
              // Improvement #8: Create issue for audit trail and team notification
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `🚨 Direct push blocked to '${branch}' by ${pusher}`,
                  body: `**Direct Push Protection Triggered**\n\n` +
                    `- **Pusher**: ${pusher}\n` +
                    `- **Branch**: ${branch}\n` +
                    `- **Commit**: ${commitSha.substring(0, 7)}\n` +
                    `- **Message**: ${commitMessage.split('\n')[0]}\n` +
                    `- **Timestamp**: ${timestamp}\n\n` +
                    `**Action Required**: Use GitFlow workflow (feature branch → PR → review → merge)\n\n` +
                    `See [Development Policy](docs/.github/skills/development-policy/SKILL.md) for details.`,
                  labels: ['violation', 'push-protection', 'ci']
                });
                core.notice(`📋 Created issue for audit trail`);
              } catch (error) {
                core.warning(`⚠️ Failed to create audit issue: ${error.message}`);
              }
            } else {
              auditLog.action = 'ALLOWED';
              auditLog.reason = 'non_protected_branch';
              core.info(`✅ Direct push to '${branch}' allowed (not a protected branch)`);
              core.info(JSON.stringify(auditLog));
            }

# ─── Branch Flow Validation ───────────────────────────────────────────────────

  pr-branch-flow:
    name: Validate Branch Flow
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/') }}
    steps:
      - name: Validate source branch naming and flow
        run: |
          HEAD="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"

          echo "Head branch: $HEAD"
          echo "Base branch: $BASE"

          # Allow develop -> main as a standard gitflow promotion merge
          if [[ "$HEAD" == "develop" && "$BASE" == "main" ]]; then
            echo "✅ Allowing develop -> main gitflow promotion merge."
            exit 0
          fi

          if [[ ! "$HEAD" =~ ^(feature|fix|docs|chore|refactor|test|ci)/.+$ ]]; then
            echo "❌ Branch '$HEAD' does not follow the naming convention."
            echo "Allowed patterns: feature/*, fix/*, docs/*, chore/*, refactor/*, test/*, ci/*"
            echo "Exception: develop -> main is also allowed for gitflow promotion."
            exit 1
          fi
          echo "✅ Branch '$HEAD' follows the naming convention."

# ─── PR Branch Name Validation ───────────────────────────────────────────────

  pr-branch-name:
    runs-on: ubuntu-latest
    name: Validate Branch Name
    if: github.event_name == 'pull_request'

    steps:
      - name: Check branch naming convention
        run: |
          branch="${{ github.head_ref }}"
          
          # Allow develop/main/master
          if [[ "$branch" == "develop" || "$branch" == "main" || "$branch" == "master" ]]; then
            echo "✅ Branch: $branch (skipping validation)"
            exit 0
          fi
          
          # Validate <type>/<topic> pattern
          if [[ ! $branch =~ ^(feature|fix|docs|refactor|test|chore|ci)/[a-z0-9][a-z0-9-]*$ ]]; then
            echo "❌ Invalid branch name: $branch"
            echo ""
            echo "Branch names must follow: <type>/<topic>"
            echo "  - type: feature, fix, docs, refactor, test, chore, ci"
            echo "  - topic: lowercase letters, numbers, hyphens"
            echo ""
            echo "Examples: feature/saga-replay, fix/storage-leak, docs/dev-guide"
            exit 1
          fi
          
          echo "✅ Branch name valid: $branch"

# ─── PR Title Validation (Conventional Commit) ────────────────────────────────

  pr-title:
    name: Validate PR Title Format
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/') }}
    steps:
      - name: Validate PR title follows conventional commit format
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;
            const commitRegex = /^(feat|fix|docs|refactor|test|perf|build|ci|chore|revert)(\([a-z-]+(?:,[a-z-]+)*\))?!?:\s+\S/;
            
            if (!commitRegex.test(title)) {
              core.setFailed(
                `PR title must follow conventional commit format: type(scope): subject\n` +
                `\n` +
                `Current title: "${title}"\n` +
                `\n` +
                `Valid types: feat, fix, docs, refactor, test, perf, build, ci, chore, revert\n` +
                `Valid scopes: saga, dag, outbox, storage, strategies, monitoring, cli, execution, triggers, visualization, integrations, sagaz, docs, ci, deps, tests\n` +
                `\n` +
                `Examples:\n` +
                `  feat(saga): add replay capability\n` +
                `  fix(storage): resolve connection pool leak\n` +
                `  ci(ci): consolidate workflows\n` +
                `  docs(sagaz): update architecture guide`
              );
            }

# ─── PR Description Validation ────────────────────────────────────────────────

  pr-description:
    name: Validate PR Description
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/') }}
    steps:
      - name: Validate PR description sections
        uses: actions/github-script@v9
        with:
          script: |
            const body = (context.payload.pull_request.body || "").toLowerCase();

            const requiredSections = [
              "## changes",
              "## motivation",
              "## impact"
            ];

            const missing = requiredSections.filter(s => !body.includes(s));

            if (missing.length > 0) {
              core.setFailed(
                `PR description is missing required section(s): ${missing.join(", ")}\n` +
                `Please include: ## Changes, ## Motivation, ## Impact`
              );
            }

# ─── Issue Reference Validation ───────────────────────────────────────────────

  pr-require-issue:
    name: Require Issue Reference
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/') }}
    steps:
      - name: Check PR description for issue reference (if required by PR type)
        uses: actions/github-script@v9
        with:
          script: |
            const head = context.payload.pull_request.head_ref || "";
            const body = (context.payload.pull_request.body || "").toLowerCase();

            // PR types that DO NOT require issue references (per docs/development/ISSUE-PR-POLICY.md)
            const exemptTypes = [
              "test/",      // Test improvements
              "ci/",        // CI/CD workflow updates
              "build/",     // Build process updates
              "chore/",     // Routine maintenance
              "docs/",      // Documentation (most cases)
            ];

            // Check if this PR type is exempt
            const isExempt = exemptTypes.some(type => head.startsWith(type));

            if (isExempt) {
              core.info(`✅ PR type '${head.split('/')[0]}/' is exempt from issue reference requirement.`);
              return;
            }

            // For feature/fix/refactor/perf/revert: require issue reference
            const patterns = [
              /closes\s*:?\s+#\d+(?:[.,;!?]|\s|$)/,
              /fixes\s*:?\s+#\d+(?:[.,;!?]|\s|$)/,
              /resolves\s*:?\s+#\d+(?:[.,;!?]|\s|$)/,
              /relates\s+to\s*:?\s+#\d+(?:[.,;!?]|\s|$)/,
              /ref\s*:?\s+#\d+(?:[.,;!?]|\s|$)/
            ];

            const found = patterns.some(p => p.test(body));

            if (!found) {
              core.setFailed(
                `Pull Request of type '${head.split('/')[0]}/' must reference an Issue.\n\n` +
                `Use one of: 'Closes #<number>', 'Fixes #<number>', 'Resolves #<number>', 'Relates to #<number>', or 'Ref #<number>'.\n\n` +
                `See: docs/development/ISSUE-PR-POLICY.md for details on when issues are required.\n\n` +
                `Exempt PR types: test/, ci/, build/, chore/, docs/`
              );
            }

# ─── Commit Message Validation ───────────────────────────────────────────────

  pr-commitlint:
    runs-on: ubuntu-latest
    name: Validate Commit Messages

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate commits
        run: |
          # Skip validation for merge commits
          if git log -1 --pretty=%B | grep -q "^Merge "; then
            echo "✅ Skipping merge commit validation"
            exit 0
          fi
          
          # Validate all commits in this PR
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD
          else
            # For push events, validate recent commits
            npx commitlint --from HEAD~5 --to HEAD || true
            echo "✅ Commit message validation passed"
          fi

      - name: Check for empty commit messages
        run: |
          echo "Checking for empty commit messages..."
          empty_commits=0
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            commits=$(git rev-list ${{ github.event.pull_request.base.sha }}..HEAD)
          else
            commits=$(git rev-list HEAD~5..HEAD 2>/dev/null || echo "")
          fi
          
          for commit in $commits; do
            msg=$(git log --format=%B -n 1 "$commit" 2>/dev/null || true)
            
            # Skip merge commits
            if echo "$msg" | grep -q "^Merge "; then
              continue
            fi
            
            # Check for empty message
            if [ -z "$(echo "$msg" | grep -v '^#' | tr -d '[:space:]')" ]; then
              echo "❌ Empty commit message: $commit"
              empty_commits=$((empty_commits + 1))
            fi
          done
          
          if [ $empty_commits -gt 0 ]; then
            echo "❌ Found $empty_commits commit(s) with empty messages"
            exit 1
          fi
          
          echo "✅ All commits have meaningful messages"
