name: Release

on:
  # Triggered automatically when a milestone is closed
  milestone:
    types: [closed]
  # Manual trigger for hotfixes or overrides
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to release (e.g. 1.5.0). Overrides milestone title.'
        required: false
        type: string
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        default: true
        type: boolean

env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Resolve which version to release from milestone title or manual input
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      milestone_title: ${{ steps.version.outputs.milestone_title }}
      dry_run: ${{ steps.version.outputs.dry_run }}
    steps:
      - name: Determine version
        id: version
        env:
          MILESTONE_TITLE: ${{ github.event.milestone.title }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          # Manual override takes precedence
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
            MILESTONE_TITLE="v${INPUT_VERSION}"
            DRY_RUN="${INPUT_DRY_RUN:-false}"
          elif [[ -n "$MILESTONE_TITLE" ]]; then
            # Extract "1.5.0" from "v1.5.0: Governance & Ops"
            VERSION=$(echo "$MILESTONE_TITLE" | grep -oP 'v?\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            DRY_RUN="false"
          else
            echo "No version source found (milestone or manual input)" >&2
            exit 1
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Could not extract version from: '$MILESTONE_TITLE'" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "milestone_title=${MILESTONE_TITLE}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (tag: v${VERSION}, dry_run: ${DRY_RUN})"

  # Run tests before releasing
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    needs: resolve-version
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          # Install to system Python (no venv needed for CI)
          uv pip install --system -e .[storage,integration-tests]
          uv pip install --system pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  # Build and publish to PyPI
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [resolve-version, test]
    
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for version bump commit

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Bump version in pyproject.toml
        if: needs.resolve-version.outputs.dry_run == 'false'
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          echo "Bumped pyproject.toml to ${VERSION}"

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          twine check dist/*
          echo "Built packages:"
          ls -la dist/

      - name: Publish to Test PyPI (dry run)
        if: needs.resolve-version.outputs.dry_run == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: needs.resolve-version.outputs.dry_run == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing - no token needed if configured on PyPI

  # Commit version bump, tag, and create GitHub Release
  tag-and-release:
    name: Tag & Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, publish]
    if: needs.resolve-version.outputs.dry_run == 'false'

    permissions:
      contents: write  # Required to push tags and create releases

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: develop  # Always tag from develop, not feature branch

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in pyproject.toml and commit
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${VERSION} [skip ci]"

      - name: Create and push tag
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          MILESTONE_TITLE: ${{ needs.resolve-version.outputs.milestone_title }}
        run: |
          git tag -a "${TAG}" -m "Release ${TAG}: ${MILESTONE_TITLE}"
          git push origin HEAD:develop --follow-tags

      - name: Generate release notes from milestone PRs
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          MILESTONE_TITLE: ${{ needs.resolve-version.outputs.milestone_title }}
          MILESTONE_NUMBER: ${{ github.event.milestone.number }}
        run: |
          # Collect merged PRs in the milestone
          if [[ -n "$MILESTONE_NUMBER" ]]; then
            NOTES=$(gh pr list \
              --state merged \
              --search "milestone:\"${MILESTONE_TITLE}\"" \
              --json number,title,url \
              --jq '.[] | "- \(.title) ([#\(.number)](\(.url)))"' \
              2>/dev/null || echo "")
          fi

          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG](https://github.com/brunolnetto/sagaz/blob/main/CHANGELOG.md) for details."
          fi

          {
            echo "body<<EOF"
            echo "## ${MILESTONE_TITLE}"
            echo ""
            echo "### Changes"
            echo "${NOTES}"
            echo ""
            echo "### Installation"
            echo '```'
            echo "pip install sagaz==${TAG#v}"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          MILESTONE_TITLE: ${{ needs.resolve-version.outputs.milestone_title }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}: ${MILESTONE_TITLE}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --target develop
