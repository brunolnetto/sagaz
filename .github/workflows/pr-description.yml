name: PR Description

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/') }}
    steps:
      - name: Validate PR description sections
        uses: actions/github-script@v8
        with:
          script: |
            const body = (context.payload.pull_request.body || "").toLowerCase();

            const requiredSections = [
              "## changes",
              "## motivation",
              "## impact"
            ];

            const missing = requiredSections.filter(s => !body.includes(s));

            if (missing.length > 0) {
              core.setFailed(
                `PR description is missing required section(s): ${missing.join(", ")}\n` +
                `Please include: ## Changes, ## Motivation, ## Impact`
              );
            }
