name: Commit Label Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sync-labels:
    if: ${{ !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Map commit types to labels
        uses: actions/github-script@v7
        with:
          script: |
            // ---------------------------------------------------------------------------
            // Mapping: commitlint type/scope  →  GitHub label name
            // Labels that don't exist in the repo are created on first use.
            // ---------------------------------------------------------------------------
            const TYPE_LABEL_MAP = {
              feat:     { name: 'enhancement',   color: 'a2eeef' },
              fix:      { name: 'bug',            color: 'd73a4a' },
              docs:     { name: 'documentation',  color: '0075ca' },
              refactor: { name: 'refactor',       color: 'fbca04' },
              test:     { name: 'tests',          color: 'bfd4f2' },
              perf:     { name: 'performance',    color: 'e99695' },
              build:    { name: 'build',          color: 'f9d0c4' },
              ci:       { name: 'ci',             color: '1d76db' },
              chore:    { name: 'chore',          color: 'ededed' },
              revert:   { name: 'revert',         color: 'ee0701' },
            };

            const FOOTER_RE = /^(?:closes?|fixes?|resolves?)\s*:?\s+#(\d+)/gim;
            const COMMIT_TYPE_RE = /^(\w+)(?:\([^)]+\))?!?:/;

            const prNumber = context.payload.pull_request.number;
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;

            // ---- fetch all commits in this PR ----
            const { data: commits } = await github.rest.pulls.listCommits({
              owner, repo, pull_number: prNumber, per_page: 100,
            });

            const typeCounts = {};
            const referencedIssues = new Set();

            for (const { commit } of commits) {
              const msg = commit.message;

              // Extract commit type
              const m = COMMIT_TYPE_RE.exec(msg);
              if (m) {
                const t = m[1].toLowerCase();
                typeCounts[t] = (typeCounts[t] ?? 0) + 1;
              }

              // Extract issue/PR references from commit footer lines
              let ref;
              while ((ref = FOOTER_RE.exec(msg)) !== null) {
                referencedIssues.add(parseInt(ref[1], 10));
              }
            }

            if (Object.keys(typeCounts).length === 0) {
              core.info('No conventional commits found in this PR — skipping label sync.');
              return;
            }

            // ---- ensure labels exist, collect names to apply ----
            async function ensureLabel(info) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: info.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name:        info.name,
                    color:       info.color,
                    description: `Commit type: ${info.name}`,
                  });
                  core.info(`Created label: ${info.name}`);
                } else {
                  throw e;
                }
              }
            }

            // Collect unique labels for all types found in this PR
            const labelsToApply = new Set();
            for (const type of Object.keys(typeCounts)) {
              const info = TYPE_LABEL_MAP[type];
              if (info) {
                await ensureLabel(info);
                labelsToApply.add(info.name);
              }
            }

            if (labelsToApply.size === 0) {
              core.info('No recognised commit types mapped to labels.');
              return;
            }

            const labelArray = Array.from(labelsToApply);
            core.info(`Applying labels [${labelArray.join(', ')}] to PR #${prNumber}`);

            // ---- apply to the PR ----
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels: labelArray,
            });

            // ---- apply to each referenced issue/PR ----
            for (const issueNumber of referencedIssues) {
              try {
                core.info(`Applying labels [${labelArray.join(', ')}] to issue/PR #${issueNumber}`);
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issueNumber,
                  labels: labelArray,
                });
              } catch (e) {
                // Issue may not exist or be closed — log but don't fail the workflow
                core.warning(`Could not apply labels to #${issueNumber}: ${e.message}`);
              }
            }

            core.info('Label sync complete.');
