name: Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Sundays at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      config:
        description: 'Test configuration (local/production)'
        required: false
        default: 'local'

env:
  CI: true
  PYTHONDONTWRITEBYTECODE: 1

# ─── Lint & Format ────────────────────────────────────────────────────────────

jobs:
  lint:
    name: Lint & Format (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff linter
        run: uv run ruff check sagaz/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: uv run ruff format --check sagaz/ tests/

      - name: Install optional dependencies for type checking
        run: uv pip install redis aio-pika aiokafka prometheus_client asyncpg

      - name: Run mypy type checker
        run: uv run mypy sagaz/ --ignore-missing-imports
        continue-on-error: true  # pre-existing type errors tracked separately; fix in follow-up

# ─── Security ─────────────────────────────────────────────────────────────────

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run bandit security linter
        run: |
          uv run bandit -r sagaz/ -c pyproject.toml -f sarif -o bandit-results.sarif 2>/dev/null || true
          if [ ! -f bandit-results.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Bandit","version":"1.7.5"}},"results":[]}]}' > bandit-results.sarif
          fi

      - name: Upload bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit
        continue-on-error: true

      - name: Run pip-audit for vulnerabilities
        run: uv run pip-audit --strict --progress-spinner=off || true

# ─── Code Quality (CodeQL + Cyclomatic Complexity) ───────────────────────────

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
          config: |
            paths:
              - sagaz
            paths-ignore:
              - tests
              - examples
              - docs

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  complexity:
    name: Code Complexity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Report full complexity breakdown
        run: |
          echo "### Cyclomatic Complexity Report ###"
          uv run radon cc --show-complexity --average sagaz/

      - name: Track A-grade violations (B+ complexity — roadmap target)
        # Standard: all functions must be A-grade (CC ≤ 5).
        # Currently non-blocking while the backlog of existing B-grade violations is cleared.
        # Roadmap: once all B-grade violations are resolved, set continue-on-error to false.
        run: |
          echo "### B-grade and above (A-grade standard violations) ###"
          result=$(uv run radon cc --min B sagaz/ 2>&1)
          if [ -n "$result" ]; then
            count=$(echo "$result" | grep -cE '^\s+(M|F|C) ' || true)
            echo "::warning::$count function(s) have B-grade or higher complexity (CC ≥ 6)."
            echo "Refactor these to reach the A-grade standard (CC ≤ 5) — see roadmap in issue #90."
            echo "$result"
          else
            echo "✅ All functions are A-grade (CC ≤ 5). Standard achieved!"
          fi
        continue-on-error: true  # Non-blocking until all B-grade violations are resolved

      - name: Enforce no C-grade or higher (strict gate)
        # Any function with CC ≥ 10 (grade C) is a hard blocker.
        # This gate will be tightened to B-grade once the A-grade backlog is cleared.
        run: |
          echo "### Strict gate: no C-grade (CC ≥ 10) ###"
          result=$(uv run radon cc --min C sagaz/ 2>&1)
          if [ -n "$result" ]; then
            echo "::error::Found function(s) with C-level or higher complexity (CC ≥ 10)."
            echo "Reduce cyclomatic complexity before merging."
            echo "$result"
            exit 1
          fi
          echo "No C-grade violations found."

      - name: Check maintainability index
        run: |
          echo "### Maintainability Index ###"
          uv run radon mi sagaz/ --show
          result=$(uv run radon mi sagaz/ --min C 2>&1)
          if echo "$result" | grep -qE "^sagaz"; then
            echo "::warning::Some files have low maintainability index"
            echo "$result"
          fi

# ─── Performance Benchmarks ───────────────────────────────────────────────────

  benchmark:
    name: "Run Benchmarks"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[prometheus]"
          uv sync --group dev

      - name: Run performance tests (local config)
        id: perf_local
        run: |
          source .venv/bin/activate
          echo "## Performance Test Results (Local Config)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          pytest tests/test_performance.py -v -s -m "performance and not slow" --tb=short 2>&1 | tee perf_output.txt
          cat perf_output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Extract metrics
        id: metrics
        run: |
          THROUGHPUT=$(grep -oP 'Throughput: \K[\d.]+' perf_output.txt | head -1 || echo "N/A")
          P95=$(grep -oP 'P95.*: \K[\d.]+' perf_output.txt | head -1 || echo "N/A")
          P99=$(grep -oP 'P99.*: \K[\d.]+' perf_output.txt | head -1 || echo "N/A")

          echo "throughput=$THROUGHPUT" >> $GITHUB_OUTPUT
          echo "p95=$P95" >> $GITHUB_OUTPUT
          echo "p99=$P99" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Key Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Throughput | ${THROUGHPUT} sagas/sec |" >> $GITHUB_STEP_SUMMARY
          echo "| P95 Latency | ${P95} ms |" >> $GITHUB_STEP_SUMMARY
          echo "| P99 Latency | ${P99} ms |" >> $GITHUB_STEP_SUMMARY

      - name: Run stress tests
        if: github.event_name == 'schedule' || github.event.inputs.config == 'production'
        run: |
          source .venv/bin/activate
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          pytest tests/test_performance.py -v -s -m stress --tb=short 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: perf_output.txt
          retention-days: 30

      - name: Check for regressions
        run: |
          THROUGHPUT=$(grep -oP 'Throughput: \K[\d.]+' perf_output.txt | head -1)
          if [ ! -z "$THROUGHPUT" ]; then
            if (( $(echo "$THROUGHPUT < 30" | bc -l) )); then
              echo "::error::Performance regression detected! Throughput: $THROUGHPUT sagas/sec (min: 30)"
              exit 1
            fi
          fi
          echo "Performance check passed"

  benchmark-comparison:
    name: "Compare with baseline"
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Download current results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          path: current/

      - name: Compare metrics
        run: |
          echo "## Performance Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Comparing against baseline metrics..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BASELINE_THROUGHPUT=100
          BASELINE_P95=50

          CURRENT_THROUGHPUT=$(grep -oP 'Throughput: \K[\d.]+' current/perf_output.txt | head -1 || echo "0")
          CURRENT_P95=$(grep -oP 'P95.*: \K[\d.]+' current/perf_output.txt | head -1 || echo "0")

          echo "| Metric | Current | Baseline | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|----------|--------|" >> $GITHUB_STEP_SUMMARY

          if (( $(echo "$CURRENT_THROUGHPUT >= $BASELINE_THROUGHPUT" | bc -l) )); then
            echo "| Throughput | ${CURRENT_THROUGHPUT} | ${BASELINE_THROUGHPUT} | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Throughput | ${CURRENT_THROUGHPUT} | ${BASELINE_THROUGHPUT} | ⚠️ Below baseline |" >> $GITHUB_STEP_SUMMARY
          fi

          if (( $(echo "$CURRENT_P95 <= $BASELINE_P95" | bc -l) )); then
            echo "| P95 Latency | ${CURRENT_P95}ms | ${BASELINE_P95}ms | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| P95 Latency | ${CURRENT_P95}ms | ${BASELINE_P95}ms | ⚠️ Above baseline |" >> $GITHUB_STEP_SUMMARY
          fi
