name: Maintenance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  issues:
    types: [opened, edited]

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─── Commit & Scope-based Labeling ─────────────────────────────────────────
  # Extracts labels from commit conventional messages and applies to PR + issues
  label-by-commit:
    name: Label by commit scope & type
    runs-on: ubuntu-latest
    if: |
      !startsWith(github.head_ref, 'dependabot/') &&
      !startsWith(github.head_ref, 'renovate/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Label PR and referenced issues
        uses: actions/github-script@v7
        with:
          script: |
            // ===== CONFIGURATION =====
            const SCOPE_LABEL_MAP = {
              sage: { name: 'saga', color: '5319e7' },
              dag: { name: 'dag', color: '3f51b5' },
              outbox: { name: 'outbox', color: '0099cc' },
              storage: { name: 'storage', color: '0e8a16' },
              strategies: { name: 'strategies', color: '1f6feb' },
              monitoring: { name: 'monitoring', color: 'f0883e' },
              cli: { name: 'cli', color: 'a2eeef' },
              execution: { name: 'execution', color: '8e44ad' },
              triggers: { name: 'triggers', color: 'e11d21' },
              visualization: { name: 'visualization', color: '009800' },
              integrations: { name: 'integrations', color: 'ffd700' },
              sagaz: { name: 'sagaz', color: '1d76db' },
              docs: { name: 'documentation', color: '0075ca' },
              ci: { name: 'ci', color: '1d76db' },
              deps: { name: 'dependencies', color: 'bfd4f2' },
              tests: { name: 'tests', color: '0e8a16' },
            };

            const TYPE_LABEL_MAP = {
              feat: { name: 'enhancement', color: 'a2eeef' },
              fix: { name: 'bug', color: 'd73a4a' },
              docs: { name: 'documentation', color: '0075ca' },
              refactor: { name: 'refactor', color: 'fbca04' },
              test: { name: 'tests', color: 'bfd4f2' },
              perf: { name: 'performance', color: 'e99695' },
              build: { name: 'build', color: 'f9d0c4' },
              ci: { name: 'ci', color: '1d76db' },
              chore: { name: 'chore', color: 'ededed' },
              revert: { name: 'revert', color: 'ee0701' },
            };

            const COMMIT_MSG_RE = /^(\w+)(?:\(([^)]+)\))?!?:\s+(.+)/;
            const FOOTER_RE = /^(?:closes?|fixes?|resolves?)\s*:?\s+#(\d+)/gim;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Helper: create label if missing
            async function ensureLabel(labelInfo) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelInfo.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: labelInfo.name,
                    color: labelInfo.color,
                    description: labelInfo.name,
                  });
                  core.info(`Created label: ${labelInfo.name}`);
                } else {
                  throw e;
                }
              }
            }

            // Helper: apply labels to an issue
            async function applyLabels(issue_number, labelNames) {
              if (labelNames.length === 0) return;
              
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number,
                  labels: labelNames,
                });
                core.info(`Applied labels [${labelNames.join(', ')}] to #${issue_number}`);
              } catch (e) {
                core.warning(`Failed to label #${issue_number}: ${e.message}`);
              }
            }

            // ===== PROCESS PR =====
            if (context.eventName === 'pull_request') {
              const prNumber = context.payload.pull_request.number;
              
              // Fetch all commits in this PR
              const { data: commits } = await github.rest.pulls.listCommits({
                owner, repo, pull_number: prNumber, per_page: 100,
              });

              if (commits.length === 0) {
                core.info('No commits found in PR');
                return;
              }

              // Parse first commit for primary type/scope
              const firstCommitMsg = commits[0].commit.message;
              const match = COMMIT_MSG_RE.exec(firstCommitMsg);
              
              if (!match) {
                core.info(`First commit doesn't follow conventional format: ${firstCommitMsg.slice(0, 50)}`);
                return;
              }

              const [, type, scope] = match;
              const labelsToApply = [];
              const referencedIssues = new Set();

              // Apply primary type label (from first commit only)
              if (TYPE_LABEL_MAP[type]) {
                const labelInfo = TYPE_LABEL_MAP[type];
                await ensureLabel(labelInfo);
                labelsToApply.push(labelInfo.name);
              }

              // Collect ALL scopes from all commits
              const allScopes = new Set();
              for (const commit of commits) {
                const m = COMMIT_MSG_RE.exec(commit.commit.message);
                if (m && m[2]) {
                  // m[2] is the scope; can be comma-separated for multiple scopes
                  m[2].split(',').forEach(s => allScopes.add(s.trim()));
                }
                
                // Collect issue references
                let ref;
                while ((ref = FOOTER_RE.exec(commit.commit.message)) !== null) {
                  referencedIssues.add(parseInt(ref[1], 10));
                }
              }

              // Apply scope labels
              for (const sc of allScopes) {
                const labelInfo = SCOPE_LABEL_MAP[sc];
                if (labelInfo) {
                  await ensureLabel(labelInfo);
                  labelsToApply.push(labelInfo.name);
                } else {
                  core.warning(`Unknown scope: ${sc}`);
                }
              }

              // Deduplicate and apply to PR
              const uniqueLabels = [...new Set(labelsToApply)];
              if (uniqueLabels.length > 0) {
                await applyLabels(prNumber, uniqueLabels);
              }

              // Apply same labels to referenced issues
              for (const issueNumber of referencedIssues) {
                await applyLabels(issueNumber, uniqueLabels);
              }
            }

            // ===== PROCESS ISSUE =====
            // Issue labeling: extract scope from issue title/body patterns
            if (context.eventName === 'issues') {
              const issueNumber = context.payload.issue.number;
              const issueTitle = context.payload.issue.title;
              const issueBody = context.payload.issue.body || '';
              
              // Try to detect scope from issue title patterns like "[scope]" or "scope:"
              const titleMatch = issueTitle.match(/^\[([^\]]+)\]|^([a-z-]+):/i);
              const labelsToApply = [];

              if (titleMatch) {
                const scope = (titleMatch[1] || titleMatch[2]).toLowerCase();
                const labelInfo = SCOPE_LABEL_MAP[scope];
                if (labelInfo) {
                  await ensureLabel(labelInfo);
                  labelsToApply.push(labelInfo.name);
                }
              }

              if (labelsToApply.length > 0) {
                await applyLabels(issueNumber, labelsToApply);
              }
            }

  # ─── Auto-label dependency PRs ─────────────────────────────────────────────
  label-dependencies:
    name: Label dependency PRs
    runs-on: ubuntu-latest
    # Only run for Dependabot or Renovate PRs
    if: |
      startsWith(github.head_ref, 'dependabot/') ||
      startsWith(github.head_ref, 'renovate/')
    steps:
      - name: Apply "dependencies" label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const head = context.payload.pull_request.head.ref;

            const labelMap = [
              { prefix: 'dependabot/', label: 'dependencies' },
              { prefix: 'renovate/',  label: 'dependencies' },
            ];

            const labelsToAdd = labelMap
              .filter(({ prefix }) => head.startsWith(prefix))
              .map(({ label }) => label);

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr_number,
                labels: [...new Set(labelsToAdd)],
              });
              core.info(`Applied labels: ${labelsToAdd.join(', ')} to PR #${pr_number}`);
            }

  # ─── Auto-label by branch prefix (extensible) ──────────────────────────────
  label-by-branch:
    name: Label PR by branch type
    runs-on: ubuntu-latest
    # Skip Dependabot/Renovate — handled above
    if: |
      !startsWith(github.head_ref, 'dependabot/') &&
      !startsWith(github.head_ref, 'renovate/')
    steps:
      - name: Apply label matching branch prefix
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const head = context.payload.pull_request.head.ref;

            // Map branch prefix -> label name (extend this list over time)
            const prefixToLabel = {
              'feature/':  'enhancement',
              'fix/':      'bug',
              'docs/':     'documentation',
              'refactor/': 'refactor',
              'test/':     'tests',
              'ci/':       'ci',
              'chore/':    'chore',
            };

            const match = Object.entries(prefixToLabel)
              .find(([prefix]) => head.startsWith(prefix));

            if (!match) {
              core.info(`No label mapping found for branch: ${head}`);
              return;
            }

            const [, label] = match;

            // Ensure the label exists before applying (create if needed)
            const labelColors = {
              enhancement:  'a2eeef',
              bug:          'd73a4a',
              documentation:'0075ca',
              refactor:     'fbca04',
              tests:        '0e8a16',
              ci:           '1d76db',
              chore:        'ededed',
            };

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: labelColors[label] || 'ededed',
                });
                core.info(`Created missing label: ${label}`);
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr_number,
              labels: [label],
            });
            core.info(`Applied label '${label}' to PR #${pr_number} (branch: ${head})`);
